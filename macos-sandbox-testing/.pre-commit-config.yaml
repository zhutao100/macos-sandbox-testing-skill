# Workspace config for `macos-sandbox-testing/`.
#
# Keep this focused on checks that are specific to this skill bundle.
# Repo-wide hygiene lives in the root `.pre-commit-config.yaml`.

repos:
  - repo: local
    hooks:
      - id: validate-skill-dir
        name: validate macos-sandbox-testing skill dir
        entry: python3 ./scripts/validate_skill_bundle.py --skill-dir .
        language: system
        pass_filenames: false
        require_serial: true
        always_run: true
