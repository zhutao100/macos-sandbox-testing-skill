# Portable root config (works with both pre-commit and prek)
# - Keep this file small ("thin root").
# - Put language-specific hooks in per-subproject configs (workspace mode) or use files: scoping.

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-executables-have-shebangs
      - id: check-shebang-scripts-are-executable
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: check-merge-conflict
      - id: detect-private-key
      - id: check-added-large-files
        args: ["--maxkb=1024"]

  - repo: local
    hooks:
      - id: macos-sandbox-testing-repo-checks
        name: macos-sandbox-testing repo checks
        entry: python3 .agents/skills/update-macos-sandbox-testing-skill/scripts/run_repo_checks.py
        language: system
        pass_filenames: false
        require_serial: true
        always_run: true
